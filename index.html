<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="aeOS — Offline-first PWA intelligence system" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- PWA Meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="aeOS" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />

    <title>aeOS</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Boot splash -->
      <div id="boot-splash" class="boot-splash" aria-live="polite">
        <div class="boot-logo">
          <span class="boot-logo__ae">ae</span><span class="boot-logo__os">OS</span>
        </div>
        <div class="boot-progress">
          <div class="boot-progress__bar" id="boot-bar"></div>
        </div>
        <p class="boot-status" id="boot-status">Initializing intelligence layer...</p>
      </div>

      <!-- Main shell (hidden until boot completes) -->
      <div id="shell" class="shell shell--hidden" role="main">
        <!-- Sidebar navigation -->
        <nav id="sidebar" class="sidebar" aria-label="Primary navigation">
          <div class="sidebar__brand">
            <span class="brand__ae">ae</span><span class="brand__os">OS</span>
          </div>

          <ul class="sidebar__nav" role="list">
            <li>
              <button class="nav-item nav-item--active" data-view="dashboard" aria-label="Dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span>Dashboard</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="agents" aria-label="Agents">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="8" r="4"/>
                  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                  <circle cx="18" cy="6" r="2" fill="currentColor" stroke="none"/>
                </svg>
                <span>Agents</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="memories" aria-label="Memories">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17a2 2 0 002 2h4a2 2 0 002-2v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7z"/>
                  <path d="M9 17v1a3 3 0 006 0v-1"/>
                </svg>
                <span>Memories</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="tasks" aria-label="Tasks">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M9 11l3 3L22 4"/>
                  <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
                <span>Tasks</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="notes" aria-label="Notes">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
                <span>Notes</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="projects" aria-label="Projects">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                  <polyline points="2 17 12 22 22 17"/>
                  <polyline points="2 12 12 17 22 12"/>
                </svg>
                <span>Projects</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="connections" aria-label="Connections">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="18" cy="5" r="3"/>
                  <circle cx="6" cy="12" r="3"/>
                  <circle cx="18" cy="19" r="3"/>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                <span>Connections</span>
              </button>
            </li>
            <li>
              <button class="nav-item" data-view="insights" aria-label="Insights">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
                <span>Insights</span>
              </button>
            </li>
          </ul>

          <div class="sidebar__footer">
            <button class="nav-item" data-view="settings" aria-label="Settings">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
              </svg>
              <span>Settings</span>
            </button>

            <!-- Offline indicator -->
            <div id="connection-status" class="connection-status connection-status--online" aria-live="polite">
              <span class="connection-status__dot"></span>
              <span class="connection-status__label">Online</span>
            </div>
          </div>
        </nav>

        <!-- Main content area -->
        <div class="main-content" id="main-content">
          <!-- Views injected here by router -->
        </div>
      </div>
    </div>

    <!-- Toast notification container -->
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
